kind = "agent_definition"
name = "codex"
description = "Repo-owned Codex agent definition"

[auth]
required_env = ["OPENAI_API_KEY"]

[[auth.local_files]]
required_env = "OPENAI_API_KEY"
home_rel_path = ".codex/auth.json"
run_home_rel_path = ".codex/auth.json"

[toolchains.node]
minimum = "16"
preferred = "24"

[config]
schema = "schema.json"

[skills]
home_rel_dir = ".agents/skills"

[agents_md]
filename = "AGENTS.md"

[config.unified]
translate = "hooks/translate-unified.js"
allowed_models = [
  "gpt-5.3-codex",
  "gpt-5.3-codex-spark",
  "gpt-5.2-codex",
  "gpt-5.2",
  "gpt-5.1-codex-max",
  "gpt-5.1-codex",
  "gpt-5.1",
  "gpt-5-codex",
  "gpt-5-codex-mini",
  "gpt-5",
]
allowed_reasoning_levels = ["low", "medium", "high"]

[install]
check = "hooks/install-check.js"
run = "hooks/install-run.js"

[run]
prepare = "hooks/run-prepare.js"

[snapshot]
prepare = "hooks/snapshot-prepare.js"

[trajectory]
collect = "hooks/trajectory-collect.js"
