kind = "agent_definition"
name = "pi"
description = "Repo-owned Pi coding agent definition"

[toolchains.node]
minimum = "20"
preferred = "24"

[auth]

  [auth.provider_selection]
  direct_input_field = "provider"
  unified_model_provider_qualified = true

  [[auth.providers]]
  name = "openai"
  required_env = ["OPENAI_API_KEY"]

  [[auth.providers]]
  name = "anthropic"
  required_env = ["ANTHROPIC_API_KEY"]

  [[auth.providers]]
  name = "google"
  required_env = ["GEMINI_API_KEY"]

  [[auth.providers]]
  name = "*"
  auth_mode = "none"

[config]
schema = "schema.json"

[skills]
home_rel_dir = ".agents/skills"

[agents_md]
filename = "AGENTS.md"

[config.unified]
translate = "hooks/translate-unified.js"
allowed_models = ["*"]
allowed_reasoning_levels = ["off", "minimal", "low", "medium", "high", "xhigh"]

[install]
check = "hooks/install-check.js"
run = "hooks/install-run.js"

[run]
prepare = "hooks/run-prepare.js"

[trajectory]
collect = "hooks/trajectory-collect.js"
