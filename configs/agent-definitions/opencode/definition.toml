kind = "agent_definition"
name = "opencode"
description = "Repo-owned Opencode agent definition"

[auth]

  [auth.provider_selection]
  direct_input_field = "provider"
  unified_model_provider_qualified = true

  [[auth.providers]]
  name = "openai"
  required_env = ["OPENAI_API_KEY"]

  [[auth.providers]]
  name = "anthropic"
  required_env = ["ANTHROPIC_API_KEY"]

  [[auth.providers]]
  name = "google"
  required_env = ["GEMINI_API_KEY"]

  [[auth.providers]]
  name = "*"
  auth_mode = "none"

[toolchains.node]
minimum = "18"
preferred = "24"

[config]
schema = "schema.json"
validate = "hooks/validate-config.js"

[skills]
home_rel_dir = ".config/opencode/skills"

[agents_md]
filename = "AGENTS.md"

[config.unified]
translate = "hooks/translate-unified.js"
allowed_models = ["*"]
allowed_reasoning_levels = ["low", "medium", "high"]

[install]
check = "hooks/install-check.js"
run = "hooks/install-run.js"

[run]
prepare = "hooks/run-prepare.js"

[trajectory]
collect = "hooks/trajectory-collect.js"
